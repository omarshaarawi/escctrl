name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Bundle (ad-hoc signed)
        run: scripts/bundle.sh --release

      - name: Verify signature
        run: codesign --verify --deep --strict --verbose=2 dist/escctrl.app
